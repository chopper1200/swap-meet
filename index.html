<style>

.sp-hero{background:#111;border-radius:20px;padding:18px;margin-bottom:10px;border:1px solid #ff6b0022;}

.sp-form{background:#111;border-radius:20px;padding:16px 18px;margin-bottom:10px;border:1px solid #1a1a1a;}
.sp-form-title{font-size:9px;color:#333;letter-spacing:3px;font-weight:700;margin-bottom:12px;}
.sp-inp{flex:1;min-width:0;background:#0a0a0a;border:none;border-radius:12px;padding:11px 14px;color:#fff;font-size:18px;font-weight:700;outline:none;}
.sp-sel{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:12px;padding:9px;color:#fff;font-size:12px;outline:none;flex-shrink:0;}
.sp-add{width:100%;background:#ff6b00;color:#fff;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:800;cursor:pointer;margin-top:8px;}
.sp-item{display:flex;justify-content:space-between;align-items:center;padding:11px 18px;border-top:1px solid #161616;}
.sp-cat{font-size:9px;font-weight:700;color:#ff6b00;background:#ff6b0015;border-radius:6px;padding:2px 8px;}
.sp-amt{font-size:15px;font-weight:800;}
.sp-date{font-size:10px;color:#333;margin-top:2px;}
.mag-hero{background:#111;border-radius:20px;padding:18px;margin-bottom:10px;border:1px solid #a78bfa22;}
.mag-label{font-size:9px;color:#a78bfa;letter-spacing:3px;font-weight:700;margin-bottom:5px;}
.mag-val{font-size:30px;font-weight:900;color:#a78bfa;letter-spacing:-1px;}
.mag-form{background:#111;border-radius:20px;padding:16px 18px;margin-bottom:10px;border:1px solid #1a1a1a;}
.mag-form-title{font-size:9px;color:#333;letter-spacing:3px;font-weight:700;margin-bottom:12px;}
.mag-inp{flex:1;min-width:0;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:12px;padding:10px 14px;color:#fff;font-size:14px;font-weight:700;outline:none;}
.mag-inp-sm{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:8px 10px;color:#fff;font-size:13px;font-weight:700;outline:none;text-align:center;}
.mag-add-btn{width:100%;background:#a78bfa;color:#000;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:800;cursor:pointer;margin-top:8px;}
.mag-item{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-top:1px solid #161616;}
.mag-item-name{font-size:14px;font-weight:800;}
.mag-item-price{font-size:10px;color:#444;margin-top:2px;}
.mag-qty-wrap{display:flex;align-items:center;gap:6px;}
.mag-qty{font-size:18px;font-weight:900;color:#a78bfa;min-width:28px;text-align:center;}
.mag-qty.zero{color:#333;}
.mag-qty-btn{background:#1a1a1a;color:#a78bfa;border:none;border-radius:8px;width:30px;height:30px;font-size:16px;font-weight:900;cursor:pointer;}
.mag-qty-btn.minus{color:#555;}
.mag-badge{font-size:9px;font-weight:700;border-radius:4px;padding:1px 6px;background:#a78bfa20;color:#a78bfa;margin-left:6px;}
.mag-badge.out{background:#ff444420;color:#ff4444;}
.mag-del-btn{background:#1a1a1a;color:#333;border:none;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;margin-left:2px;}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#111;border-radius:24px 24px 0 0;padding:28px;width:100%;max-width:480px;border:1px solid #1e1e1e;}
.modal-title{font-size:16px;font-weight:800;margin-bottom:18px;}
.modal-inp{width:100%;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:14px;padding:14px 16px;color:#fff;font-size:16px;font-weight:700;outline:none;margin-bottom:12px;}
.modal-trow{display:flex;align-items:center;gap:10px;margin-bottom:12px;cursor:pointer;}
.modal-tlabel{font-size:12px;color:#444;}
.modal-prow{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.modal-plabel{font-size:12px;color:#444;}
.modal-pinp{width:64px;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:10px;padding:8px 10px;color:#fff;font-size:15px;font-weight:700;outline:none;text-align:center;}
.modal-btns{display:flex;gap:8px;}
.modal-cancel{flex:1;background:#1a1a1a;color:#444;border:none;border-radius:14px;padding:14px;font-size:13px;cursor:pointer;}
.modal-ok{flex:2;background:#00ff88;color:#000;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:800;cursor:pointer;}
.modal-del{flex:1;background:#ff000020;color:#ff4444;border:none;border-radius:14px;padding:14px;font-size:13px;cursor:pointer;font-weight:700;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:12px 20px;font-size:12px;font-weight:700;z-index:100;pointer-events:none;opacity:0;transition:opacity 0.3s;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.ok{border-color:#00ff8844;color:#00ff88;}
.toast.err{border-color:#ff444444;color:#ff6666;}
</style>

<body>
<div id="app"></div>
<div id="mw"></div>
<div class="toast" id="toast"></div>
<script>
var WORKER = "https://wild-sunset-677a.matb4.workers.dev";
var PAL=["#00ff88","#53d8fb","#f5a623","#a8ff78","#ee4540","#c792ea","#ff9f43","#26de81"];
var SCAT=["Carburante","Cibo","Albergo","Pedaggi","Parcheggio","Altro"];
var syncStatus="loading";
var syncMsg="Connessione...";
var saving=false;
var toastTimer=null;

function showToast(msg,type){
  var t=document.getElementById("toast");if(!t)return;
  clearTimeout(toastTimer);t.textContent=msg;t.className="toast show "+(type||"");
  toastTimer=setTimeout(function(){t.className="toast";},3000);
}

function defS(){return{
  vend:[{n:"Matteo",c:"#00ff88",p:false,perc:20},{n:"James",c:"#53d8fb",p:false,perc:20},{n:"Paride",c:"#f5a623",p:false,perc:20},{n:"Simone",c:"#a8ff78",p:false,perc:20},{n:"Nichil",c:"#ee4540",p:false,perc:20}],
  sale:{Matteo:[],James:[],Paride:[],Simone:[],Nichil:[]},
  spese:[],magazzino:[],tab:"Matteo",view:"input"
};}

var S=defS();

function loadLocal(){try{var r=localStorage.getItem("swpn3");if(r)S=JSON.parse(r);}catch(e){}}
function saveLocal(){try{localStorage.setItem("swpn3",JSON.stringify(S));}catch(e){}}
function fixS(){
  if(!S||!S.vend)S=defS();
  if(!S.spese)S.spese=[];
  if(!S.magazzino)S.magazzino=[];
  S.vend.forEach(function(v){if(!v.perc)v.perc=20;if(v.p===undefined)v.p=false;});
}

function loadRemote(cb){
  syncStatus="loading";syncMsg="Caricamento...";updatePill();
  fetch(WORKER,{method:"GET"})
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(data){
      if(data&&data.record){S=data.record;fixS();saveLocal();}
      else if(data&&data.vend){S=data;fixS();saveLocal();}
      syncStatus="ok";syncMsg="Sincronizzato";
      showToast("✓ Dati aggiornati","ok");
      updatePill();if(cb)cb();
    })
    .catch(function(err){
      syncStatus="err";syncMsg="Errore: "+err.message;
      showToast("⚠ "+err.message,"err");
      updatePill();if(cb)cb();
    });
}

function saveRemote(){
  if(saving)return;
  saving=true;syncStatus="loading";syncMsg="Salvataggio...";updatePill();
  fetch(WORKER,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(S)})
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(){
      syncStatus="ok";syncMsg="Sincronizzato";saving=false;
      showToast("✓ Salvato","ok");updatePill();
    })
    .catch(function(err){
      syncStatus="err";syncMsg="Errore: "+err.message;
      saving=false;showToast("⚠ "+err.message,"err");updatePill();
    });
}

function sv(){saveLocal();saveRemote();}
function updatePill(){
  var p=document.getElementById("syncpill");if(!p)return;
  p.textContent=syncStatus==="ok"?"● LIVE":syncStatus==="loading"?"● SYNC...":"● OFFLINE";
  p.className="sync-pill "+(syncStatus==="ok"?"ok":syncStatus==="loading"?"loading":"err");
}

function m(n){return"\u20AC"+(+n).toFixed(2).replace(".",",");}
function ds(d){try{return new Date(d).toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});}catch(e){return"";}}
function gv(n){for(var i=0;i<S.vend.length;i++)if(S.vend[i].n===n)return S.vend[i];return null;}
function gm(id){for(var i=0;i<S.magazzino.length;i++)if(S.magazzino[i].id===id)return S.magazzino[i];return null;}
function tot(n){var a=S.sale[n]||[],s=0;for(var i=0;i<a.length;i++)s+=a[i].importo;return s;}
function totG(){var s=0;for(var i=0;i<S.vend.length;i++)s+=tot(S.vend[i].n);return s;}
function totSp(){var s=0;for(var i=0;i<S.spese.length;i++)s+=S.spese[i].importo;return s;}
function totMag(){var s=0;for(var i=0;i<S.magazzino.length;i++)s+=S.magazzino[i].qty;return s;}
function pv(v){return tot(v.n)*(v.perc/100);}
function nv(v){return tot(v.n)-pv(v);}
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function mk(tag,css,txt){var e=document.createElement(tag);if(css)e.style.cssText=css;if(txt!==undefined)e.textContent=txt;return e;}
function b(txt,cls,fn){var e=el("button",cls,txt);e.onclick=fn;return e;}

function render(){
  var root=document.getElementById("app");root.innerHTML="";
  var vv=gv(S.tab)||S.vend[0];var col=vv?vv.c:"#00ff88";
  var hdr=el("div","hdr");
  var lr=el("div","logo-row");
  var lbox=el("div");
  lbox.appendChild(el("div","logo-sub","REGISTRO"));
  var lr2=mk("div","display:flex;align-items:center;flex-wrap:wrap;gap:4px;");
  var logo=el("div","logo");logo.innerHTML="\uD83C\uDFCD Swap <span>Meet</span>";
  var pill=mk("span","");pill.id="syncpill";
  pill.textContent=syncStatus==="ok"?"● LIVE":syncStatus==="loading"?"● SYNC...":"● OFFLINE";
  pill.className="sync-pill "+(syncStatus==="ok"?"ok":syncStatus==="loading"?"loading":"err");
  lr2.appendChild(logo);lr2.appendChild(pill);lbox.appendChild(lr2);lr.appendChild(lbox);
  var rbox=mk("div","display:flex;flex-direction:column;align-items:flex-end;gap:6px;");
  var vb=el("div","vnav");
  [{k:"input",l:"Input"},{k:"riepilogo",l:"Riep."},{k:"spese",l:"Spese"},{k:"magazzino",l:"\uD83D\uDCE6 Mag."}].forEach(function(x){
    vb.appendChild(b(x.l,"vnav-btn "+(S.view===x.k?"on":"off"),function(k){return function(){S.view=k;render();};}(x.k)));
  });
  rbox.appendChild(vb);
  rbox.appendChild(b("\u21BB Aggiorna","refresh-btn",function(){loadRemote(render);}));
  lr.appendChild(rbox);hdr.appendChild(lr);
  var tabs=el("div","tabs-wrap");
  S.vend.forEach(function(vx){
    var active=S.tab===vx.n&&S.view==="input";
    var tb=b(vx.n+(vx.p?" "+vx.perc+"%":""),"tab-btn",function(n){return function(){S.tab=n;S.view="input";render();};}(vx.n));
    tb.style.background=active?vx.c:"#151515";tb.style.color=active?"#000":"#444";
    var lt;
    tb.addEventListener("touchstart",function(n){return function(){lt=setTimeout(function(){openEdit(n);},600);};}(vx.n),{passive:true});
    tb.addEventListener("touchend",function(){clearTimeout(lt);},{passive:true});
    tb.addEventListener("contextmenu",function(n){return function(e){e.preventDefault();openEdit(n);};}(vx.n));
    tabs.appendChild(tb);
  });
  tabs.appendChild(b("+ nuovo","new-tab",openNew));
  hdr.appendChild(tabs);root.appendChild(hdr);
  var ct=el("div","ct");
  if(syncStatus==="err"){
    var eb=el("div","diag-box");
    eb.appendChild(el("div","diag-title","⚠ PROBLEMA CONNESSIONE"));
    eb.appendChild(mk("div","margin-bottom:8px;",syncMsg));
    var rbtn=b("Riprova","mag-add-btn",function(){loadRemote(render);});
    rbtn.style.background="#ff4444";eb.appendChild(rbtn);
    ct.appendChild(eb);
  }
  if(S.view==="input")renderInput(ct,vv,col);
  else if(S.view==="riepilogo")renderRiep(ct);
  else if(S.view==="spese")renderSpese(ct);
  else renderMagazzino(ct);
  root.appendChild(ct);
}

function renderInput(ct,vv,col){
