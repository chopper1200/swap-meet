<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;}
button,input,select{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
::-webkit-scrollbar{display:none;}
#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;}
.hdr{background:#0a0a0a;padding:16px 16px 12px;border-bottom:1px solid #151515;position:sticky;top:0;z-index:10;}
.logo-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.logo-sub{font-size:9px;color:#333;letter-spacing:3px;font-weight:600;margin-bottom:4px;}
.logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;color:#fff;}
.logo span{color:#00ff88;}
.vnav{display:flex;gap:4px;}
.vnav-btn{border:none;border-radius:8px;padding:7px 11px;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:0.3px;transition:all 0.15s;}
.vnav-btn.on{background:#00ff88;color:#000;}
.vnav-btn.off{background:#151515;color:#444;}
.tabs-wrap{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;}
.tab-btn{flex-shrink:0;border:none;border-radius:20px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.new-tab{flex-shrink:0;border:1px dashed #1e1e1e;border-radius:20px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:#333;}
.ct{flex:1;padding:14px 16px;}
.hero{background:#111;border-radius:20px;padding:20px;margin-bottom:12px;border:1px solid #1a1a1a;}
.hero-label{font-size:9px;color:#444;letter-spacing:3px;font-weight:700;margin-bottom:6px;}
.hero-val{font-size:36px;font-weight:900;letter-spacing:-1.5px;line-height:1;}
.hero-sub{font-size:11px;color:#333;margin-top:6px;}
.hero-row{display:flex;gap:10px;margin-top:14px;}
.hero-stat{flex:1;background:#0a0a0a;border-radius:12px;padding:10px;}
.hero-stat-label{font-size:8px;color:#333;letter-spacing:2px;margin-bottom:4px;}
.hero-stat-val{font-size:15px;font-weight:800;color:#fff;}
.card{background:#111;border-radius:20px;overflow:hidden;margin-bottom:10px;border:1px solid #1a1a1a;}
.card-hdr{padding:16px 18px;display:flex;justify-content:space-between;align-items:center;}
.card-name{font-size:18px;font-weight:800;letter-spacing:-0.3px;}

.card-total{font-size:28px;font-weight:900;letter-spacing:-1px;text-align:right;}
.card-netto{font-size:10px;color:#333;text-align:right;margin-top:2px;}
.perc-row{display:flex;align-items:center;gap:10px;padding:10px 18px;border-top:1px solid #161616;border-bottom:1px solid #161616;}
.toggle{width:38px;height:22px;border-radius:11px;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
.toggle-dot{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left 0.15s;}
.perc-label{font-size:11px;color:#444;}
.perc-inp{width:50px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:4px 8px;color:#fff;font-size:13px;font-weight:700;outline:none;text-align:center;}
.perc-arrow{font-size:11px;font-weight:800;margin-left:auto;}
.inp-area{padding:14px 18px;display:flex;flex-direction:column;gap:8px;}
.inp-row{display:flex;gap:8px;}
.amt-inp{flex:1;min-width:0;background:#0a0a0a;border:none;border-radius:12px;padding:12px 14px;color:#fff;font-size:18px;font-weight:700;outline:none;}
.add-btn{border:none;border-radius:12px;padding:12px 20px;font-size:20px;font-weight:900;cursor:pointer;flex-shrink:0;color:#000;}
.note-inp{background:#0a0a0a;border:none;border-radius:12px;padding:10px 14px;color:#444;font-size:12px;outline:none;width:100%;}
.sale-list{max-height:260px;overflow-y:auto;}
.sale-item{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-top:1px solid #161616;}
.sale-amt{font-size:16px;font-weight:800;}
.sale-date{font-size:10px;color:#333;margin-top:2px;}
.sale-nota{font-size:10px;color:#2a2a2a;margin-top:1px;}
.sale-perc{font-size:10px;font-weight:700;margin-top:2px;}
.del-btn{background:#1a1a1a;color:#333;border:none;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;}
.no-sales{padding:24px;text-align:center;color:#1e1e1e;font-size:11px;font-weight:700;letter-spacing:2px;}
.rm-btn{width:100%;background:transparent;color:#1e1e1e;border:none;border-top:1px solid #161616;padding:12px;font-size:10px;cursor:pointer;letter-spacing:2px;font-weight:700;}
.riep-hero{background:#111;border-radius:20px;padding:20px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;border:1px solid #1a1a1a;}
.riep-total{font-size:9px;color:#333;letter-spacing:3px;font-weight:700;margin-bottom:6px;}
.riep-val{font-size:32px;font-weight:900;color:#00ff88;letter-spacing:-1px;}
.pdf-btn{background:#00ff88;color:#000;border:none;border-radius:14px;padding:12px 16px;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:0.5px;white-space:nowrap;}
.riep-card{background:#111;border-radius:16px;padding:14px 18px;margin-bottom:8px;}
.riep-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.riep-name{font-size:15px;font-weight:800;}
.riep-count{font-size:10px;color:#333;margin-top:2px;}
.riep-amt{font-size:18px;font-weight:900;text-align:right;}
.riep-netto{font-size:10px;color:#333;text-align:right;}
.riep-badge{font-size:9px;font-weight:700;border-radius:6px;padding:2px 8px;display:inline-block;margin-top:3px;}
.prog{height:3px;background:#1a1a1a;border-radius:3px;}
.prog-fill{height:100%;border-radius:3px;}
.pbox{border-radius:16px;padding:16px 18px;margin-bottom:8px;}
.pbox-title{font-size:9px;letter-spacing:2px;font-weight:700;margin-bottom:10px;}
.pbox-row{display:flex;justify-content:space-between;margin-bottom:5px;}
.pbox-k{font-size:12px;color:#444;}
.pbox-v{font-size:12px;font-weight:600;}
.pbox-div{height:1px;background:#1a1a1a;margin:10px 0;}
.pbox-tot{display:flex;justify-content:space-between;}
.pbox-tk{font-size:14px;font-weight:800;}
.pbox-tv{font-size:14px;font-weight:800;}
.sp-hero{background:#111;border-radius:20px;padding:20px;margin-bottom:10px;border:1px solid #ff6b0022;}
.sp-label{font-size:9px;color:#ff6b00;letter-spacing:3px;font-weight:700;margin-bottom:6px;}
.sp-val{font-size:32px;font-weight:900;color:#ff6b00;letter-spacing:-1px;}
.sp-form{background:#111;border-radius:20px;padding:16px 18px;margin-bottom:10px;border:1px solid #1a1a1a;}
.sp-form-title{font-size:9px;color:#333;letter-spacing:3px;font-weight:700;margin-bottom:12px;}
.sp-inp{flex:1;min-width:0;background:#0a0a0a;border:none;border-radius:12px;padding:12px 14px;color:#fff;font-size:18px;font-weight:700;outline:none;}
.sp-sel{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:12px;padding:10px;color:#fff;font-size:12px;outline:none;flex-shrink:0;}
.sp-add{width:100%;background:#ff6b00;color:#fff;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:0.5px;margin-top:8px;}
.sp-item{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-top:1px solid #161616;}
.sp-cat{font-size:9px;font-weight:700;color:#ff6b00;background:#ff6b0015;border-radius:6px;padding:2px 8px;}
.sp-amt{font-size:15px;font-weight:800;}
.sp-date{font-size:10px;color:#333;margin-top:2px;}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#111;border-radius:24px 24px 0 0;padding:28px;width:100%;max-width:480px;border:1px solid #1e1e1e;}
.modal-title{font-size:16px;font-weight:800;margin-bottom:18px;letter-spacing:-0.3px;}
.modal-inp{width:100%;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:14px;padding:14px 16px;color:#fff;font-size:16px;font-weight:700;outline:none;margin-bottom:12px;}
.modal-trow{display:flex;align-items:center;gap:10px;margin-bottom:12px;cursor:pointer;}
.modal-tlabel{font-size:12px;color:#444;}
.modal-prow{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.modal-plabel{font-size:12px;color:#444;}
.modal-pinp{width:64px;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:10px;padding:8px 10px;color:#fff;font-size:15px;font-weight:700;outline:none;text-align:center;}
.modal-btns{display:flex;gap:8px;}
.modal-cancel{flex:1;background:#1a1a1a;color:#444;border:none;border-radius:14px;padding:14px;font-size:13px;cursor:pointer;}
.modal-ok{flex:2;background:#00ff88;color:#000;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:800;cursor:pointer;}
.modal-del{flex:1;background:#ff000020;color:#ff4444;border:none;border-radius:14px;padding:14px;font-size:13px;cursor:pointer;font-weight:700;}
</style>
</head>
<body>
<div id="app"></div>
<div id="mw"></div>
<script>
var PAL=["#00ff88","#53d8fb","#f5a623","#a8ff78","#ee4540","#c792ea","#ff9f43","#26de81"];
var SCAT=["Carburante","Cibo","Albergo","Pedaggi","Parcheggio","Altro"];
var KEY="swpn1";
function defS(){return{vend:[{n:"Matteo",c:"#00ff88",p:false,perc:20},{n:"James",c:"#53d8fb",p:false,perc:20},{n:"Paride",c:"#f5a623",p:false,perc:20},{n:"Simone",c:"#a8ff78",p:false,perc:20},{n:"Nichil",c:"#ee4540",p:false,perc:20}],sale:{Matteo:[],James:[],Paride:[],Simone:[],Nichil:[]},spese:[],tab:"Matteo",view:"input"};}
var S;try{var r=localStorage.getItem(KEY);S=r?JSON.parse(r):defS();}catch(e){S=defS();}
if(!S||!S.vend)S=defS();if(!S.spese)S.spese=[];
S.vend.forEach(function(v){if(!v.perc)v.perc=20;if(v.p===undefined)v.p=false;});
function sv(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function m(n){return"\u20AC"+(+n).toFixed(2).replace(".",",");}
function ds(d){try{return new Date(d).toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});}catch(e){return"";}}
function gv(n){for(var i=0;i<S.vend.length;i++)if(S.vend[i].n===n)return S.vend[i];return null;}
function tot(n){var a=S.sale[n]||[],s=0;for(var i=0;i<a.length;i++)s+=a[i].importo;return s;}
function totG(){var s=0;for(var i=0;i<S.vend.length;i++)s+=tot(S.vend[i].n);return s;}
function totSp(){var s=0;for(var i=0;i<S.spese.length;i++)s+=S.spese[i].importo;return s;}
function pv(v){return tot(v.n)*(v.perc/100);}
function nv(v){return tot(v.n)-pv(v);}
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function mk(tag,css,txt){var e=document.createElement(tag);if(css)e.style.cssText=css;if(txt!==undefined)e.textContent=txt;return e;}
function b(txt,cls,fn){var e=el("button",cls,txt);e.onclick=fn;return e;}

function render(){
  var root=document.getElementById("app");root.innerHTML="";
  var vv=gv(S.tab)||S.vend[0];var col=vv?vv.c:"#00ff88";
  var hdr=el("div","hdr");
  var lr=el("div","logo-row");
  var lbox=el("div");lbox.appendChild(el("div","logo-sub","REGISTRO"));
  var logo=el("div","logo");logo.innerHTML="\uD83C\uDFCD Swap <span>Meet</span>";lbox.appendChild(logo);
  lr.appendChild(lbox);
  var vb=el("div","vnav");
  [{k:"input",l:"Input"},{k:"riepilogo",l:"Riep."},{k:"spese",l:"Spese"}].forEach(function(x){
    vb.appendChild(b(x.l,"vnav-btn "+(S.view===x.k?"on":"off"),function(k){return function(){S.view=k;sv();render();};}(x.k)));
  });
  lr.appendChild(vb);hdr.appendChild(lr);
  var tabs=el("div","tabs-wrap");
  S.vend.forEach(function(vx){
    var active=S.tab===vx.n&&S.view==="input";
    var tb=b(vx.n+(vx.p?" "+vx.perc+"%":""),"tab-btn",function(n){return function(){S.tab=n;S.view="input";sv();render();};}(vx.n));
    tb.style.background=active?vx.c:"#151515";tb.style.color=active?"#000":"#444";
    var lt;
    tb.addEventListener("touchstart",function(n){return function(){lt=setTimeout(function(){openEdit(n);},600);};}(vx.n),{passive:true});
    tb.addEventListener("touchend",function(){clearTimeout(lt);},{passive:true});
    tb.addEventListener("contextmenu",function(n){return function(e){e.preventDefault();openEdit(n);};}(vx.n));
    tabs.appendChild(tb);
  });
  var nb=b("+ nuovo","new-tab",openNew);tabs.appendChild(nb);
  hdr.appendChild(tabs);root.appendChild(hdr);
  var ct=el("div","ct");
  if(S.view==="input")renderInput(ct,vv,col);
  else if(S.view==="riepilogo")renderRiep(ct);
  else renderSpese(ct);
  root.appendChild(ct);
}

function renderInput(ct,vv,col){
  var nome=vv.n,ps=vv.p,perc=vv.perc,sales=S.sale[nome]||[],t=tot(nome);
  var hero=el("div","hero");
  hero.appendChild(el("div","hero-label","TOTALE VENDITE"));
  var hv=el("div","hero-val",m(t));hv.style.color=col;hero.appendChild(hv);
  if(ps&&t>0)hero.appendChild(el("div","hero-sub","netto "+m(nv(vv))+" · perc. "+m(pv(vv))));
  var hr=el("div","hero-row");
  var hs1=el("div","hero-stat");hs1.appendChild(el("div","hero-stat-label","VENDITE"));hs1.appendChild(el("div","hero-stat-val",String(sales.length)));
  var hs2=el("div","hero-stat");hs2.appendChild(el("div","hero-stat-label","MEDIA"));hs2.appendChild(el("div","hero-stat-val",sales.length?m(t/sales.length):"—"));
  hr.appendChild(hs1);hr.appendChild(hs2);hero.appendChild(hr);ct.appendChild(hero);
  var card=el("div","card");card.style.borderColor=col+"22";
  var ch=el("div","card-hdr");ch.style.background=col+"0a";
  var cl=el("div");var cn=el("div","card-name",nome);cn.style.color=col;cl.appendChild(cn);
  if(ps)cl.appendChild(el("div","card-badge","PERC. "+perc+"% ATTIVA"));
  var cr=el("div");var ctv=el("div","card-total",m(t));ctv.style.color=col;cr.appendChild(ctv);
  if(ps&&t>0)cr.appendChild(el("div","card-netto","netto "+m(nv(vv))));
  ch.appendChild(cl);ch.appendChild(cr);card.appendChild(ch);
  var prow=el("div","perc-row");
  var tbg=el("div","toggle");tbg.style.background=ps?col:"#1a1a1a";
  var tdt=el("div","toggle-dot");tdt.style.left=ps?"19px":"3px";tbg.appendChild(tdt);
  tbg.onclick=function(){vv.p=!vv.p;sv();render();};
  prow.appendChild(tbg);prow.appendChild(el("div","perc-label","Percentuale:"));
  var pi=document.createElement("input");pi.type="number";pi.value=perc;pi.min=0;pi.max=100;pi.className="perc-inp";
  pi.onchange=function(){var v=parseFloat(pi.value);if(!isNaN(v)&&v>=0&&v<=100){vv.perc=v;sv();render();}};
  prow.appendChild(pi);prow.appendChild(el("div","perc-label","%"));
  if(ps&&t>0){var pa=el("div","perc-arrow","\u2192 "+m(pv(vv)));pa.style.color=col;prow.appendChild(pa);}
  card.appendChild(prow);
  var ia=el("div","inp-area");var ir=el("div","inp-row");
  var ai=document.createElement("input");ai.type="number";ai.inputMode="decimal";ai.placeholder="\u20AC importo";ai.className="amt-inp";ai.style.border="1px solid "+col+"33";
  var ni=document.createElement("input");ni.type="text";ni.placeholder="aggiungi una nota...";ni.className="note-inp";
  var ab=b("+","add-btn",function(){
    var val=parseFloat((ai.value||"").replace(",","."));if(isNaN(val)||val<=0)return;
    if(!S.sale[nome])S.sale[nome]=[];
    S.sale[nome].push({importo:val,nota:ni.value||"",id:Date.now(),data:new Date().toISOString()});
    ai.value="";ni.value="";sv();render();
  });
  ab.style.background=col;ai.onkeydown=function(e){if(e.key==="Enter")ab.onclick();};
  ir.appendChild(ai);ir.appendChild(ab);ia.appendChild(ir);ia.appendChild(ni);card.appendChild(ia);
  var sl=el("div","sale-list");
  if(!sales.length){sl.appendChild(el("div","no-sales","NESSUNA VENDITA"));}
  else{sales.slice().reverse().forEach(function(s){
    var si=el("div","sale-item");var info=el("div");
    var sa=el("div","sale-amt",m(s.importo));sa.style.color=col;info.appendChild(sa);
    info.appendChild(el("div","sale-date",ds(s.data)));
    if(s.nota)info.appendChild(el("div","sale-nota",s.nota));
    if(ps)info.appendChild(el("div","sale-perc","perc. "+m(s.importo*(perc/100))));
    var db=b("\u2715","del-btn",function(id){return function(){S.sale[nome]=S.sale[nome].filter(function(x){return x.id!==id;});sv();render();};}(s.id));
    si.appendChild(info);si.appendChild(db);sl.appendChild(si);
  });}
  card.appendChild(sl);
  if(S.vend.length>1){card.appendChild(b("RIMUOVI "+nome.toUpperCase()+" DAL REGISTRO","rm-btn",function(){
    if(!confirm("Rimuovere "+nome+"?"))return;
    S.vend=S.vend.filter(function(x){return x.n!==nome;});delete S.sale[nome];S.tab=S.vend[0]?S.vend[0].n:"";sv();render();
  }));}
  ct.appendChild(card);
}

function renderRiep(ct){
  var tg=totG(),ts=totSp();
  var rh=el("div","riep-hero");
  var rb=el("div");rb.appendChild(el("div","riep-total","TOTALE GENERALE"));rb.appendChild(el("div","riep-val",m(tg)));
  if(ts>0)rb.appendChild(mk("div","font-size:11px;color:#333;margin-top:4px;","netto spese: "+m(tg-ts)));
  rh.appendChild(rb);rh.appendChild(b("\uD83D\uDCC4 PDF","pdf-btn",esporta));ct.appendChild(rh);
  S.vend.forEach(function(vx){
    var t=tot(vx.n),n=(S.sale[vx.n]||[]).length;
    var rc=el("div","riep-card");rc.style.border="1px solid "+vx.c+"22";
    var row=el("div","riep-row");
    var rl=el("div");var rn=el("div","riep-name",vx.n);rn.style.color=vx.c;rl.appendChild(rn);rl.appendChild(el("div","riep-count",n+" vendita"+(n!==1?"e":"")));
    var rr=el("div");var ra=el("div","riep-amt",m(t));ra.style.color=vx.c;rr.appendChild(ra);
    if(vx.p&&t>0){rr.appendChild(el("div","riep-netto","netto "+m(nv(vx))));var bdg=el("div","riep-badge",vx.perc+"% = "+m(pv(vx)));bdg.style.color=vx.c;bdg.style.background=vx.c+"20";rr.appendChild(bdg);}
    row.appendChild(rl);row.appendChild(rr);rc.appendChild(row);
    var pg=el("div","prog");var pf=el("div","prog-fill");pf.style.background=vx.c;pf.style.width=(tg>0?(t/tg*100):0)+"%";pg.appendChild(pf);rc.appendChild(pg);

  S.vend.forEach(function(vx){
    if(!vx.p||tot(vx.n)<=0)return;
    var pb=el("div","pbox");pb.style.background=vx.c+"10";pb.style.border="1px solid "+vx.c+"33";
    var pt=el("div","pbox-title","PERCENTUALE "+vx.n.toUpperCase()+" ("+vx.perc+"%)");pt.style.color=vx.c;pb.appendChild(pt);
    [["Vendite lorde",m(tot(vx.n))],["Percentuale ("+vx.perc+"%)","- "+m(pv(vx))]].forEach(function(row){
      var r=el("div","pbox-row");r.appendChild(el("div","pbox-k",row[0]));r.appendChild(el("div","pbox-v",row[1]));pb.appendChild(r);
    });
    pb.appendChild(el("div","pbox-div"));
    var tr=el("div","pbox-tot");var tk=el("div","pbox-tk","Netto "+vx.n);var tv=el("div","pbox-tv",m(nv(vx)));tv.style.color=vx.c;tr.appendChild(tk);tr.appendChild(tv);pb.appendChild(tr);
    ct.appendChild(pb);
  });
  if(ts>0){
    var sb=el("div","pbox");sb.style.background="#ff6b0010";sb.style.border="1px solid #ff6b0033";
    var st=el("div","pbox-title","TOTALE SPESE");st.style.color="#ff6b00";sb.appendChild(st);
    var cats={};S.spese.forEach(function(s){cats[s.cat]=(cats[s.cat]||0)+s.importo;});
    Object.keys(cats).forEach(function(cat){var r=el("div","pbox-row");r.appendChild(el("div","pbox-k",cat));r.appendChild(el("div","pbox-v",m(cats[cat])));sb.appendChild(r);});
    sb.appendChild(el("div","pbox-div"));
    var tr2=el("div","pbox-tot");var tk2=el("div","pbox-tk","Totale");var tv2=el("div","pbox-tv",m(ts));tv2.style.color="#ff6b00";tr2.appendChild(tk2);tr2.appendChild(tv2);sb.appendChild(tr2);
    ct.appendChild(sb);
  }
}

function renderSpese(ct){
  var ts=totSp();
  var sh=el("div","sp-hero");sh.appendChild(el("div","sp-label","TOTALE SPESE"));sh.appendChild(el("div","sp-val",m(ts)));ct.appendChild(sh);
  var sf=el("div","sp-form");sf.appendChild(el("div","sp-form-title","NUOVA SPESA"));
  var r1=mk("div","display:flex;gap:8px;margin-bottom:8px;");
  var si=document.createElement("input");si.type="number";si.inputMode="decimal";si.placeholder="\u20AC importo";si.className="sp-inp";
  var sel=document.createElement("select");sel.className="sp-sel";
  SCAT.forEach(function(c){var o=document.createElement("option");o.value=c;o.textContent=c;sel.appendChild(o);});
  r1.appendChild(si);r1.appendChild(sel);sf.appendChild(r1);
  var sn=document.createElement("input");sn.type="text";sn.placeholder="nota...";sn.className="note-inp";sn.style.marginBottom="8px";sf.appendChild(sn);
  var sab=b("+ AGGIUNGI SPESA","sp-add",function(){
    var val=parseFloat((si.value||"").replace(",","."));if(isNaN(val)||val<=0)return;
    S.spese.push({importo:val,cat:sel.value,nota:sn.value||"",id:Date.now(),data:new Date().toISOString()});
    si.value="";sn.value="";sv();render();
  });
  si.onkeydown=function(e){if(e.key==="Enter")sab.onclick();};sf.appendChild(sab);ct.appendChild(sf);
  if(!S.spese.length){ct.appendChild(mk("div","background:#111;border-radius:20px;padding:24px;text-align:center;color:#1e1e1e;font-size:11px;font-weight:700;letter-spacing:2px;border:1px solid #151515;","NESSUNA SPESA"));return;}
  var list=el("div","card");
  S.spese.slice().reverse().forEach(function(s){
    var si2=el("div","sp-item");var info=el("div");
    var fr=mk("div","display:flex;align-items:center;gap:8px;margin-bottom:3px;");
    fr.appendChild(el("span","sp-cat",s.cat));fr.appendChild(el("span","sp-amt",m(s.importo)));
    info.appendChild(fr);info.appendChild(el("div","sp-date",ds(s.data)));
    if(s.nota)info.appendChild(el("div","sale-nota",s.nota));
    var db=b("\u2715","del-btn",function(id){return function(){S.spese=S.spese.filter(function(x){return x.id!==id;});sv();render();};}(s.id));
    si2.appendChild(info);si2.appendChild(db);list.appendChild(si2);
  });
  ct.appendChild(list);
}

function openNew(){
  var mw=document.getElementById("mw");mw.innerHTML="";
  var np=false,npc=20;
  var ov=mk("div","position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:50;display:flex;align-items:flex-end;justify-content:center;");
  var mb=el("div","modal-box");mb.appendChild(el("div","modal-title","Nuovo venditore"));
  var mi=document.createElement("input");mi.type="text";mi.placeholder="Nome...";mi.className="modal-inp";mb.appendChild(mi);
  var tr=el("div","modal-trow");var tbg=el("div","toggle");tbg.style.background="#1a1a1a";var tdt=el("div","toggle-dot");tdt.style.left="3px";tbg.appendChild(tdt);tr.appendChild(tbg);tr.appendChild(el("div","modal-tlabel","Percentuale attiva"));
  tr.onclick=function(){np=!np;tbg.style.background=np?"#00ff88":"#1a1a1a";tdt.style.left=np?"19px":"3px";};mb.appendChild(tr);
  var pr=el("div","modal-prow");pr.appendChild(el("div","modal-plabel","Percentuale:"));
  var pi=document.createElement("input");pi.type="number";pi.value=20;pi.className="modal-pinp";pi.onchange=function(){npc=parseFloat(pi.value)||20;};
  pr.appendChild(pi);pr.appendChild(el("div","modal-plabel","%"));mb.appendChild(pr);
  var btns=el("div","modal-btns");btns.appendChild(b("Annulla","modal-cancel",function(){mw.innerHTML="";}));
  var ok=b("Aggiungi","modal-ok",function(){
    var nome=mi.value.trim();if(!nome||gv(nome))return;
    var c=PAL[S.vend.length%PAL.length];S.vend.push({n:nome,c:c,p:np,perc:npc});S.sale[nome]=[];
    S.tab=nome;S.view="input";mw.innerHTML="";sv();render();
  });
  mi.onkeydown=function(e){if(e.key==="Enter")ok.onclick();};
  btns.appendChild(ok);mb.appendChild(btns);ov.appendChild(mb);ov.onclick=function(e){if(e.target===ov)mw.innerHTML="";};
  mw.appendChild(ov);setTimeout(function(){mi.focus();},100);
}

function openEdit(nome){
  var vx=gv(nome);if(!vx)return;
  var mw=document.getElementById("mw");mw.innerHTML="";
  var ov=mk("div","position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:50;display:flex;align-items:flex-end;justify-content:center;");
  var mb=el("div","modal-box");mb.style.borderTopColor=vx.c+"44";mb.appendChild(el("div","modal-title","Modifica "+nome));
  var ni=document.createElement("input");ni.type="text";ni.value=nome;ni.className="modal-inp";mb.appendChild(ni);
  var btns=el("div","modal-btns");btns.appendChild(b("Annulla","modal-cancel",function(){mw.innerHTML="";}));
  if(S.vend.length>1)btns.appendChild(b("Elimina","modal-del",function(){
    if(!confirm("Eliminare "+nome+"?"))return;
    S.vend=S.vend.filter(function(x){return x.n!==nome;});delete S.sale[nome];S.tab=S.vend[0]?S.vend[0].n:"";mw.innerHTML="";sv();render();
  }));
  btns.appendChild(b("Salva","modal-ok",function(){
    var nn=ni.value.trim();if(!nn)return;
    if(nn!==nome){vx.n=nn;S.sale[nn]=S.sale[nome]||[];delete S.sale[nome];if(S.tab===nome)S.tab=nn;}
    mw.innerHTML="";sv();render();
  }));
  mb.appendChild(btns);ov.appendChild(mb);ov.onclick=function(e){if(e.target===ov)mw.innerHTML="";};
  mw.appendChild(ov);setTimeout(function(){ni.focus();ni.select();},100);
}

function esporta(){
  var today=new Date().toLocaleDateString("it-IT"),tg=totG(),ts=totSp(),out="";
  S.vend.forEach(function(vx,i){
    var t=tot(vx.n),arr=S.sale[vx.n]||[];out+=vx.n.toUpperCase()+"\n";
    if(!arr.length){out+="  nessuna vendita\n";}
    else arr.forEach(function(s){out+="  - "+ds(s.data)+" "+m(s.importo)+(s.nota?" ("+s.nota+")":"")+(vx.p?" ["+vx.perc+"% = "+m(s.importo*(vx.perc/100))+"]":"")+"\n";});
    out+="  TOTALE: "+m(t)+"\n";
    if(vx.p&&t>0)out+="  Percentuale "+vx.perc+"%: "+m(pv(vx))+"\n  Netto: "+m(nv(vx))+"\n";
    if(i<S.vend.length-1)out+="\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\n";
  });
  if(S.spese.length){out+="\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nSPESE\n";S.spese.forEach(function(s){out+="  - "+s.cat+": "+m(s.importo)+(s.nota?" ("+s.nota+")":"")+"\n";});out+="  TOTALE: "+m(ts)+"\n";}
  var html="<!DOCTYPE html><html><head><meta charset='utf-8'><title>Swap Meet</title><style>body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:32px;color:#111;max-width:600px;margin:0 auto}h1{font-size:24px;font-weight:800;letter-spacing:-0.5px;border-bottom:2px solid #111;padding-bottom:10px}pre{font-size:13px;line-height:1.9;white-space:pre-wrap;margin-top:18px;font-family:'Courier New',monospace}.tot{margin-top:12px;border-top:2px solid #111;padding-top:10px;font-size:17px;font-weight:800}@media print{button{display:none}}</style></head><body><h1>Vendite Swap Meet</h1><p style='color:#888;font-size:13px;margin-top:6px'>Esportato il "+today+"</p><pre>"+out+"</pre><div class='tot'>TOTALE VENDITE: "+m(tg)+"</div>"+(ts>0?"<div class='tot' style='color:#888'>TOTALE SPESE: - "+m(ts)+"</div><div class='tot'>NETTO: "+m(tg-ts)+"</div>":"")+"<br><button onclick='window.print()' style='margin-top:14px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;border-radius:10px;border:2px solid #111;'>Stampa / Salva PDF</button></body></html>";
  var w=window.open("","_blank");if(!w){alert("Abilita popup nel browser");return;}w.document.write(html);w.document.close();w.focus();
}
render();
